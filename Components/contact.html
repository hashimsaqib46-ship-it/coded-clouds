<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codedclouds - Contact </title>
    <link rel="icon" type="image/jpg" href="../images/fav.jpg">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="../images/fav.jpg">

</head>
<style>
    .main{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 60px;
        width: 100%; 
    }
    .nav{
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 60px;
        width: 98%; 
    }
    .f-main{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50px;
        width: 100%; 
        background-color: rgb(17, 17, 58);
    }
    .f-content{
        color: white;
        font-size: 14px;
        font-weight: 500;
    }
      @media (max-width: 768px) {
    #elastic-cursor {
        display: none !important;
    }
}
</style>
<body>
    <div class="main">
         <div class="nav">
        <div class="logo"></div>
        <a href="../index.html" style="text-decoration: none; width: 150px;">
      <button class="btn" id="nav-career" style="width: 150px;">BACK TO HOME</button></a>
     </div>
    </div>
    <!--contact-->
   <div id="unique-contact-section" style="font-family: 'Montserrat', sans-serif; background-color: #fff; overflow-x: hidden; width: 100%; box-sizing: border-box;">
    
    <section style="display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 40px; padding: 60px 5%; max-width: 1300px; margin: 0 auto; width: 100%; box-sizing: border-box;">
        
        <div class="contact-left-col" style="flex: 2; min-width: 320px; box-sizing: border-box;">
            <h1 style="font-size: clamp(28px, 5vw, 36px); margin: 0 0 10px 0; color: rgb(17, 17, 58); font-weight: 800; line-height: 1.2;">Let’s Start a Conversation</h1>
            <p style="font-size: 15px; margin: 0 0 30px 0; color: #666; line-height: 1.6; font-weight: 500;">Fill out the form below and we will get back to you shortly.</p>

            <form id="contactForm" style="display: flex; flex-direction: column; gap: 15px; background: #fff; box-sizing: border-box;">
                
                <input type="hidden" name="selected_services" id="selected_services">

                <div style="display: flex; flex-wrap: wrap; gap: 15px; width: 100%;">
                    <div style="flex: 1; min-width: 250px;">
                        <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Full Name <span style="color: red;">*</span></label>
                        <input type="text" name="full_name" placeholder="Omaan Jallane" required style="width: 100%; padding: 10px 5px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; font-family: 'Montserrat', sans-serif; outline: none;">
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Work Email <span style="color: red;">*</span></label>
                        <input type="email" name="user_email" placeholder="email@company.com" required style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; font-family: 'Montserrat', sans-serif; outline: none;">
                    </div>
                </div>

                <div style="display: flex; flex-wrap: wrap; gap: 15px; width: 100%;">
                    <div style="flex: 1; min-width: 250px;">
                        <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Phone Number <span style="color: red;">*</span></label>
                        <div style="display: flex; gap: 5px;">
                            <select name="country_code" required style="width: 90px; padding: 10px 5px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 13px; outline: none;">
                                <option value="+966">SA +966</option>
                                <option value="+92">PK +92</option>
                                <option value="+971">UAE +971</option>
                            </select>
                            <input type="tel" name="phone_number" placeholder="55 123 4567" required style="flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; outline: none;">
                        </div>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Company Name <span style="color: red;">*</span></label>
                        <input type="text" name="company_name" placeholder="CodedCloud Ltd." required style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; outline: none;">
                    </div>
                </div>

                <div style="display: flex; flex-wrap: wrap; gap: 15px; width: 100%;">
                    <div style="flex: 1; min-width: 250px;">
                        <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Company Website</label>
                        <input type="url" name="company_url" placeholder="https://codedclouds.org" style="width: 100%; padding: 10px 5px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; outline: none;">
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Region <span style="color: red;">*</span></label>
                        <select name="region" required style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; outline: none;">
                            <option value="" disabled selected>Please Select</option>
                            <option value="Saudi Arabia">Saudi Arabia</option>
                            <option value="Pakistan">Pakistan</option>
                            <option value="Middle East">Middle East</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div style="width: 100%;">
                    <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">Services interested in: <span style="color: red;">*</span></label>
                    <div style="position: relative; width: 100%;">
                      <select class="service-select" name="services" required 
    style="width: 100%; padding: 10px 15px; font-size: 14px; color: #444; background: #f8f9fa; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; appearance: none; -webkit-appearance: none; outline: none; transition: 0.3s; box-sizing: border-box;">
    
    <option value="" disabled selected>Click to select a service...</option>
    
    <option value="Web Development">Web Development</option>
    <option value="Mobile App Development">Mobile App Development</option>
    <option value="Custom Software">Custom Software Solutions</option>
    
    <option value="PMS">PMS (Property Management Systems)</option>
    <option value="CRM">Full CRM Integrations</option>
    <option value="POS">POS Software Solutions</option>
    
    <option value="Ecommerce">E-commerce Platforms</option>
    <option value="Digital Marketing">Digital Marketing & SEO</option>
    <option value="Branding">Branding & IT Consultancy</option>
    
    <option value="AI Automation">AI & Workflow Automation</option>
</select>
                        <div style="position: absolute; top: 50%; right: 15px; transform: translateY(-50%); pointer-events: none; color: rgb(17, 17, 58);">
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                    </div>
                </div>

                <div style="width: 100%;">
                     <label style="font-size: 13px; font-weight: 700; color: rgb(17, 17, 58); margin-bottom: 6px; display: block;">How can we help you?</label>
                     <textarea name="message" rows="3" placeholder="Project details..." style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; background: #f8f9fa; font-size: 14px; outline: none; resize: vertical;"></textarea>
                </div>

                <div style="margin-top: 5px;">
                    <label style="display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: #444; cursor: pointer;">
                        <input type="checkbox" name="looking_for_job" style="width: 16px; height: 16px; accent-color: rgb(17, 17, 58);"> 
                        <strong>I am looking for a career opportunity</strong>
                    </label>
                </div>
                
                <button type="submit" style="background: rgb(17, 17, 58); color: #fff; font-size: 14px; font-weight: 700; padding: 12px 35px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; text-transform: uppercase; align-self: flex-start; margin-top: 10px;">Submit Inquiry</button>
            </form>
        </div>

        <div class="contact-right-col" style="flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 30px; padding-top: 10px;">
            
            <div style="padding-left: 20px; border-left: 4px solid rgb(17, 17, 58);">
                <h2 style="font-size: 12px; color: rgb(17, 17, 58); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: 700;">Earth</h2>
                <h3 style="font-size: 22px; margin-bottom: 10px; font-weight: 800; color: #222;">Global Presence</h3>
                <p style="font-size: 14px; margin-bottom: 10px; color: #555; line-height: 1.5;">Across 5 continents, serving you globally.</p>
                <a href="./Components/Presence.html" style="color: rgb(17, 17, 58); text-decoration: none; font-weight: 700; font-size: 12px; text-transform: uppercase;">Learn more &rarr;</a>
            </div>

            <div style="padding-left: 20px; border-left: 4px solid rgb(17, 17, 58);">
                <h2 style="font-size: 12px; color: rgb(17, 17, 58); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: 700;">People</h2>
                <h3 style="font-size: 22px; margin-bottom: 10px; font-weight: 800; color: #222;">Global Leaders</h3>
                <p style="font-size: 14px; margin-bottom: 10px; color: #555; line-height: 1.5;">Capability backed by diverse leadership.</p>
                <a href="./Components/Leaders.html" style="color: rgb(17, 17, 58); text-decoration: none; font-weight: 700; font-size: 12px; text-transform: uppercase;">Learn more &rarr;</a>
            </div>

        </div>
    </section>
</div>
    <footer>
        <div class="f-main">
            <div class="f-content">
                <p>© 2026 CodedClouds. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
